workflows:
  android-release:
    name: TealWave Android APK
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug --split-per-abi
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - dakshmohan180@gmail.com
        notify:
          success: true
          failure: true
